<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能询价报价 - UnitClaw.ai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0F172A',
                        secondary: '#1E40AF',
                        accent: '#3B82F6',
                        dark: '#020617',
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'glow': 'glow 2s ease-in-out infinite alternate',
                    },
                    keyframes: {
                        float: { '0%, 100%': { transform: 'translateY(0px)' }, '50%': { transform: 'translateY(-20px)' } },
                        glow: { '0%': { boxShadow: '0 0 5px rgba(96, 165, 250, 0.5)' }, '100%': { boxShadow: '0 0 20px rgba(96, 165, 250, 0.8)' } }
                    }
                },
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .text-gradient { background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
            .glass { background: rgba(15,23,42,0.7); backdrop-filter: blur(10px); border: 1px solid rgba(59,130,246,0.2); }
            .card-hover { transition: all 0.3s ease; }
            .card-hover:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(59,130,246,0.2); }
        }
    </style>
</head>
<body class="bg-primary text-white overflow-x-hidden">
    <div id="particles-js" class="fixed inset-0 z-0"></div>

    <!-- Navbar -->
    <nav class="fixed top-0 left-0 right-0 z-50 glass">
        <div class="container mx-auto px-6 py-3 flex justify-between items-center">
            <a href="index.html" class="flex items-center space-x-2">
                <div class="w-10 h-10 bg-gradient-to-r from-secondary to-accent rounded-lg flex items-center justify-center animate-glow">
                    <i class="fas fa-cube text-white text-xl"></i>
                </div>
                <span class="text-2xl font-bold">Unit<span class="text-accent">Claw</span>.ai</span>
            </a>
            <a href="logistics.html" class="text-sm text-accent hover:underline"><i class="fas fa-arrow-left mr-1"></i>返回物流方案</a>
        </div>
    </nav>

    <!-- Hero -->
    <section class="pt-32 pb-12 relative">
        <div class="container mx-auto px-6 relative">
            <div class="flex items-center space-x-3 mb-4">
                <div class="w-12 h-12 bg-accent/20 rounded-lg flex items-center justify-center">
                    <i class="fas fa-file-invoice-dollar text-accent text-xl"></i>
                </div>
                <div>
                    <h1 class="text-3xl font-bold">智能询价报价</h1>
                    <p class="text-gray-400 text-sm">SKILL #001 · 物流行业</p>
                </div>
            </div>
        </div>
    </section>

    <!-- 演示区 -->
    <section class="pb-20 relative">
        <div class="container mx-auto px-6 relative">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <!-- 左侧：输入区 -->
                <div class="glass rounded-2xl p-8">
                    <h3 class="text-xl font-bold mb-6"><i class="fas fa-paper-plane text-accent mr-2"></i>模拟输入</h3>
                    <p class="text-gray-400 text-sm mb-6">粘贴客户询价邮件，AI自动解析并生成报价单</p>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-bold mb-2">客户询价邮件</label>
                            <textarea id="email-input" rows="8" class="w-full px-4 py-3 bg-primary/50 border border-accent/30 rounded-lg text-white placeholder-gray-500 text-sm" placeholder="粘贴询价邮件内容...">Dear Sales Team,

We need a quote for shipping 2×40HQ from Shenzhen to Los Angeles.
Commodity: Furniture. Weight: approx 18,000 KG.
Preferred departure: before May 20th.

Please advise best rate.

Best regards,
John Smith
ABC Trading Co.</textarea>
                        </div>
                        <button onclick="runDemo()" class="w-full py-3 bg-gradient-to-r from-secondary to-accent rounded-lg font-bold hover:opacity-90 transition-opacity">
                            <i class="fas fa-play mr-2"></i>运行 AI 解析
                        </button>
                    </div>
                </div>
                <!-- 右侧：输出区 -->
                <div class="glass rounded-2xl p-8">
                    <h3 class="text-xl font-bold mb-6"><i class="fas fa-robot text-accent mr-2"></i>AI 解析结果</h3>
                    <p class="text-gray-400 text-sm mb-6">以下为AI自动解析并生成的报价方案</p>
                    <div id="result-area" class="space-y-4">
                        <div class="text-center text-gray-500 py-12">
                            <i class="fas fa-arrow-left text-3xl mb-3 opacity-30"></i>
                            <p>点击「运行 AI 解析」查看结果</p>
                        </div>
                    </div>
                </div>
            </div>
            <!-- 流程说明 -->
            <div class="mt-12 glass rounded-2xl p-8">
                <h3 class="text-xl font-bold mb-6">执行流程</h3>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div class="text-center p-4">
                        <div class="w-12 h-12 bg-accent/20 rounded-full flex items-center justify-center mx-auto mb-3">
                            <span class="text-accent font-bold">1</span>
                        </div>
                        <div class="font-bold text-sm mb-1">邮件解析</div>
                        <div class="text-gray-400 text-xs">NLP识别起运地、目的地、柜型、货品</div>
                    </div>
                    <div class="text-center p-4">
                        <div class="w-12 h-12 bg-accent/20 rounded-full flex items-center justify-center mx-auto mb-3">
                            <span class="text-accent font-bold">2</span>
                        </div>
                        <div class="font-bold text-sm mb-1">运价匹配</div>
                        <div class="text-gray-400 text-xs">自动匹配合作船公司最新运价表</div>
                    </div>
                    <div class="text-center p-4">
                        <div class="w-12 h-12 bg-accent/20 rounded-full flex items-center justify-center mx-auto mb-3">
                            <span class="text-accent font-bold">3</span>
                        </div>
                        <div class="font-bold text-sm mb-1">生成报价单</div>
                        <div class="text-gray-400 text-xs">自动填充模板，生成PDF报价单</div>
                    </div>
                    <div class="text-center p-4">
                        <div class="w-12 h-12 bg-accent/20 rounded-full flex items-center justify-center mx-auto mb-3">
                            <span class="text-accent font-bold">4</span>
                        </div>
                        <div class="font-bold text-sm mb-1">自动回复</div>
                        <div class="text-gray-400 text-xs">AI生成专业回复邮件，一键发送</div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="py-8 bg-dark border-t border-gray-800/50 text-center text-gray-400 text-sm">
        <a href="logistics.html" class="text-accent hover:underline">← 返回物流行业解决方案</a>
    </footer>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS("particles-js", {
            particles: { number: { value: 60 }, color: { value: "#60A5FA" }, opacity: { value: 0.15 }, size: { value: 2 }, move: { speed: 0.5 } }
        });

        function runDemo() {
            const input = document.getElementById('email-input').value;
            const resultArea = document.getElementById('result-area');
            resultArea.innerHTML = `
                <div class="space-y-4">
                    <div class="flex items-center space-x-2 text-green-400 text-sm mb-2">
                        <i class="fas fa-check-circle"></i>
                        <span>解析完成，耗时 0.8秒</span>
                    </div>
                    <div class="glass rounded-xl p-4">
                        <div class="text-xs text-gray-400 mb-2">📋 解析结果</div>
                        <div class="grid grid-cols-2 gap-2 text-sm">
                            <div>起运地：<span class="text-white">深圳</span></div>
                            <div>目的地：<span class="text-white">洛杉矶</span></div>
                            <div>柜型：<span class="text-white">2×40HQ</span></div>
                            <div>货品：<span class="text-white">家具</span></div>
                            <div>重量：<span class="text-white">18,000 KG</span></div>
                            <div>船期：<span class="text-white">5月20日前</span></div>
                        </div>
                    </div>
                    <div class="glass rounded-xl p-4">
                        <div class="text-xs text-gray-400 mb-2">💰 匹配运价（TOP 3）</div>
                        <table class="w-full text-sm">
                            <tr class="text-gray-400"><td class="py-1">MSK</td><td class="py-1">$2,850/40HQ</td><td class="py-1 text-green-400">ETD 5/18</td></tr>
                            <tr class="text-gray-400"><td class="py-1">COSCO</td><td class="py-1">$2,920/40HQ</td><td class="py-1 text-green-400">ETD 5/19</td></tr>
                            <tr class="text-gray-400"><td class="py-1">EMC</td><td class="py-1">$2,780/40HQ</td><td class="py-1 text-yellow-400">ETD 5/22</td></tr>
                        </table>
                    </div>
                    <div class="glass rounded-xl p-4">
                        <div class="text-xs text-gray-400 mb-2">📄 报价单预览</div>
                        <div class="text-sm text-gray-300">
                            <p>Dear John Smith,</p>
                            <p class="mt-2">感谢您的询价，针对您的需求（深圳→洛杉矶，2×40HQ，家具），我们为您匹配到最优运价：</p>
                            <p class="mt-2 text-accent font-bold">EMC $2,780/40HQ，ETD 5/22，中转</p>
                            <p class="mt-2">附件为正式报价单，请查收。如有疑问，欢迎随时联系。</p>
                        </div>
                    </div>
                    <div class="flex space-x-3">
                        <button class="flex-1 py-2 bg-accent/20 text-accent rounded-lg text-sm hover:bg-accent/30 transition-colors">
                            <i class="fas fa-eye mr-1"></i>预览报价单
                        </button>
                        <button class="flex-1 py-2 bg-gradient-to-r from-secondary to-accent rounded-lg text-sm font-bold hover:opacity-90">
                            <i class="fas fa-paper-plane mr-1"></i>发送报价邮件
                        </button>
                    </div>
                </div>`;
        }
    </script>
</body>
</html>
